version: "3.8"

services:
  vertice-ia:
    build: .
    container_name: vertice-ia
    expose:
      - "8501"
    env_file:
      - .env.prod
    volumes:
      - ./banco:/app/banco
      - ./dados:/app/dados
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vertice.rule=Host(`vertice.klauberfischer.online`)"
      - "traefik.http.routers.vertice.entrypoints=websecure"
      - "traefik.http.routers.vertice.tls.certresolver=letsencrypt"
      - "traefik.http.services.vertice.loadbalancer.server.port=8501"
      - "traefik.docker.network=proxy"
    networks:
      - proxy
      - vertice-net

  langfuse:
    image: langfuse/langfuse:2
    container_name: vertice-langfuse
    # Acesse via SSH tunnel: ssh -L 3000:localhost:3000 user@vps-ip
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET}
      - NEXTAUTH_URL=http://localhost:3001
      - SALT=${LANGFUSE_SALT}
    depends_on:
      - langfuse-db
    restart: unless-stopped
    networks:
      - vertice-net

  langfuse-db:
    image: postgres:15-alpine
    container_name: vertice-langfuse-db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=${LANGFUSE_DB_PASSWORD}
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - vertice-net

volumes:
  langfuse_data:

networks:
  proxy:
    external: true
  vertice-net:
    driver: bridge
