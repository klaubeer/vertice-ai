version: "3.8"

services:
  vertice-ia:
    build: .
    container_name: vertice-ia
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./banco:/app/banco
      - ./dados:/app/dados
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: vertice-langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=segredo-local-dev
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=sal-local-dev
    depends_on:
      - langfuse-db

  langfuse-db:
    image: postgres:15-alpine
    container_name: vertice-langfuse-db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data

volumes:
  langfuse_data:
